<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  /* Customize these CSS custom properties to rebrand the template. */
  :root {
    --bg: #0f172a;            /* Background color */
    --accent: #38bdf8;        /* Accent color (used for the dot + shimmer) */
    --text: #f1f5f9;          /* Primary text color */
    --muted: rgba(241, 245, 249, 0.65);  /* Subtitle text */
    --font-heading: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 480px;
    height: 480px;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: var(--font-heading);
    color: var(--text);
  }

  .container {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }

  /* Accent dot pulses in first */
  .dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0;
    transform: scale(0);
    animation: dot-pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s forwards;
    box-shadow: 0 0 24px var(--accent);
  }

  @keyframes dot-pop {
    0%   { opacity: 0; transform: scale(0); }
    100% { opacity: 1; transform: scale(1); }
  }

  /* Headline slides up with fade */
  .headline {
    font-size: 56px;
    font-weight: 800;
    letter-spacing: -0.02em;
    opacity: 0;
    transform: translateY(24px);
    animation: slide-up 0.6s ease-out 0.35s forwards;
  }

  /* Subtitle follows */
  .subtitle {
    font-size: 18px;
    font-weight: 400;
    color: var(--muted);
    opacity: 0;
    transform: translateY(20px);
    animation: slide-up 0.6s ease-out 0.65s forwards;
  }

  @keyframes slide-up {
    0%   { opacity: 0; transform: translateY(20px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* Shimmer sweep across the headline at the end */
  .shimmer {
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(
      105deg,
      transparent 40%,
      rgba(255, 255, 255, 0.18) 50%,
      transparent 60%
    );
    animation: shimmer-sweep 0.9s ease-in-out 1.5s forwards;
    pointer-events: none;
  }

  @keyframes shimmer-sweep {
    0%   { left: -100%; }
    100% { left: 100%; }
  }
</style>
</head>
<body>
  <div class="container">
    <div class="dot"></div>
    <div class="headline">Hello, world.</div>
    <div class="subtitle">Your tagline goes here.</div>
    <div class="shimmer"></div>
  </div>
</body>
</html>
